services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: altama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d altama"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/altama
      DB_STARTUP_MAX_RETRIES: 30
      DB_STARTUP_RETRY_DELAY_SECONDS: 2
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  postgres_data:
